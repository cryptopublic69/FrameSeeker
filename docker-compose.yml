services:
  qdrant:
    image: qdrant/qdrant:v1.18.1
    container_name: framefinder-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - framefinder_qdrant_data:/qdrant/storage

volumes:
  framefinder_qdrant_data:
    name: framefinder_qdrant_data
